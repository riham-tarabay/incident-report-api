name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify database migrations (upgrade, downgrade, re-upgrade)
        env:
          DATABASE_URL: sqlite:///./ci_migrations.db
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Run tests
        run: pytest -v
